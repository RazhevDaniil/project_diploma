services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cloudru-tz-backend
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./faiss_index:/app/faiss_index
      - ./crawl_cache:/app/crawl_cache
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./knowledge_base_data:/app/knowledge_base_data

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: cloudru-tz-ui
    environment:
      BACKEND_API_URL: http://backend:8000
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://foundation-models.api.cloud.ru/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-GigaChat/GigaChat-2-Max}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-BAAI/bge-m3}
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "8501:8501"
