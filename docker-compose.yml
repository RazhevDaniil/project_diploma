services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cloudru-tz-backend
    env_file:
      - .env
    environment:
      HTTP_PROXY: "http://host.docker.internal:10809"
      HTTPS_PROXY: "http://host.docker.internal:10809"
      NO_PROXY: "localhost,127.0.0.1,backend,ui,0.0.0.0"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./runs:/app/runs
      - ./prompt_versions:/app/prompt_versions
      - ./rag_cache:/app/rag_cache
      - ./settings:/app/settings
      - ./local_rag:/app/local_rag

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: cloudru-tz-ui
    environment:
      BACKEND_API_URL: http://backend:8000
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://foundation-models.api.cloud.ru/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-Qwen/Qwen3-Next-80B-A3B-Instruct}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.05}
      LLM_REQUEST_DELAY: ${LLM_REQUEST_DELAY:-0}
      PARSER_MODE: ${PARSER_MODE:-fast}
      PARSER_CHUNK_SIZE: ${PARSER_CHUNK_SIZE:-6000}
      PARSER_CONCURRENCY: ${PARSER_CONCURRENCY:-4}
      PARSER_FAST_MIN_REQUIREMENTS: ${PARSER_FAST_MIN_REQUIREMENTS:-20}
      PARSER_FAST_MAX_REQUIREMENTS: ${PARSER_FAST_MAX_REQUIREMENTS:-1000}
      MAX_REQUIREMENTS_PER_BATCH: ${MAX_REQUIREMENTS_PER_BATCH:-8}
      ANALYSIS_RAG_MODE: ${ANALYSIS_RAG_MODE:-per_requirement}
      ANALYSIS_BATCH_CONCURRENCY: ${ANALYSIS_BATCH_CONCURRENCY:-4}
      MANAGED_RAG_URL: ${MANAGED_RAG_URL:-https://e424a162-618c-4862-b789-b089abd81b46.managed-rag.inference.cloud.ru/api/v2/retrieve}
      MANAGED_RAG_KB_VERSION: ${MANAGED_RAG_KB_VERSION:-eb73eb63-ec91-47c9-851e-1c14949b7a14}
      MANAGED_RAG_RESULTS: ${MANAGED_RAG_RESULTS:-6}
      MANAGED_RAG_CONTEXT_CHUNKS: ${MANAGED_RAG_CONTEXT_CHUNKS:-6}
      MANAGED_RAG_MAX_TOKENS: ${MANAGED_RAG_MAX_TOKENS:-2048}
      MANAGED_RAG_TEMPERATURE: ${MANAGED_RAG_TEMPERATURE:-0.01}
      MANAGED_RAG_CONCURRENCY: ${MANAGED_RAG_CONCURRENCY:-4}
      MANAGED_RAG_CACHE_ENABLED: ${MANAGED_RAG_CACHE_ENABLED:-true}
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "8501:8501"
